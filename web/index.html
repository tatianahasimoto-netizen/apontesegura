<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cpf_seguro_design_system">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>cpf_seguro_design_system</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Mermaid vendorado (aba Fluxos) — sem CDN em runtime. -->
  <script src="mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'loose',
      theme: 'base',
      themeVariables: {
        fontFamily: "-apple-system, 'SF Pro Rounded', 'SF Pro Display', 'Segoe UI', sans-serif",
        fontSize: '13px',
        primaryColor: '#EEF3FF',
        primaryTextColor: '#16191F',
        primaryBorderColor: '#003BE0',
        lineColor: '#98A2B3',
        secondaryColor: '#FFFFFF',
        tertiaryColor: '#FFFFFF',
        clusterBkg: '#FAFBFD',
        clusterBorder: '#E4E7EC',
        edgeLabelBackground: '#FFFFFF',
      },
      flowchart: { curve: 'basis', htmlLabels: true, nodeSpacing: 36, rankSpacing: 48 },
    });

    // Renderiza uma definição mermaid num container com pan (drag) e zoom
    // (wheel) próprios — chamado pelo MermaidView (Flutter).
    let _mmdSeq = 0;
    window.renderMermaid = function (el, def) {
      const id = 'mmd' + (++_mmdSeq);
      mermaid.render(id, def).then(({ svg }) => {
        el.innerHTML = svg;
        const svgEl = el.querySelector('svg');
        if (!svgEl) return;
        svgEl.style.maxWidth = 'none';
        let scale = 1, tx = 24, ty = 24, panning = false, sx = 0, sy = 0;
        const apply = () => {
          svgEl.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
          svgEl.style.transformOrigin = '0 0';
        };
        apply();
        el.addEventListener('wheel', function (e) {
          e.preventDefault();
          const f = e.deltaY < 0 ? 1.08 : 0.93;
          scale = Math.min(3, Math.max(0.15, scale * f));
          apply();
        }, { passive: false });
        el.addEventListener('mousedown', function (e) {
          panning = true; sx = e.clientX - tx; sy = e.clientY - ty;
          el.style.cursor = 'grabbing';
        });
        window.addEventListener('mousemove', function (e) {
          if (!panning) return;
          tx = e.clientX - sx; ty = e.clientY - sy; apply();
        });
        window.addEventListener('mouseup', function () {
          panning = false; el.style.cursor = 'grab';
        });
      }).catch(function (err) {
        el.innerHTML = '<pre style="color:#B42318;padding:16px;white-space:pre-wrap">' +
          String(err) + '</pre>';
      });
    };
  </script>
</body>
</html>
